<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECHNet - Cotización</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- ================== NAVBAR ================== -->
    <nav class="navbar">
      <div class="logo">
        <img src="phyton/cargando.png" alt="logo" />
      </div>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="planes.html">Planes</a></li>
        <li><a href="cotizacion.html">Cotización</a></li>
      </ul>
    </nav>

    <!-- ================== FORMULARIO DE COTIZACIÓN ================== -->
    <section class="form-section">
      <div class="container">
        <h2 class="section-title">Solicitar Cotización</h2>
        <form id="form-cotizacion" class="form-cotizacion">
          <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Tu nombre completo"
              required
            />
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              placeholder="Tu número de teléfono"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tu@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="direccion">Dirección de servicio</label>
            <input
              type="text"
              id="direccion"
              name="direccion"
              placeholder="Dirección donde se instalará el servicio"
              required
            />
          </div>

          <div class="form-group">
            <label for="plan">Plan de interés</label>
            <select id="plan" name="plan" required>
              <option value="">Selecciona un plan</option>
              <option value="Básico">Básico - 20 Mbps - $50.000/mes</option>
              <option value="Hogar">Hogar - 50 Mbps - $80.000/mes</option>
              <option value="Pro">Pro - 100 Mbps - $120.000/mes</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje adicional (opcional)</label>
            <textarea
              id="mensaje"
              name="mensaje"
              rows="4"
              placeholder="¿Alguna pregunta o comentario?"
            ></textarea>
          </div>

          <button type="submit" class="submit-cta">Enviar Solicitud</button>
        </form>
      </div>
    </section>

    <!-- ================== FOOTER ================== -->
    <footer>
      <div class="container">
        <p>&copy; 2026 TECHNet. Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
